name: game_hub
description: "GameHub – a bundle of offline mini-games."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Navigation
  go_router: ^14.2.0

  # Sound (added properly in the "polish" deliverable, declared now so it's ready)
  audioplayers: ^6.0.0

  # Fonts / UI polish
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/game-folder.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF6B4A"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/